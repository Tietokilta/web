version: "3"

services:
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=cms
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=payload
    volumes:
      - db:/var/lib/postgresql/data
    logging:
      driver: none
    expose:
      - 5432
    ports:
      - 5432:5432

volumes:
  db:
