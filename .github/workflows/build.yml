name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
env:
  # Change this to upload the built image to your own organization.
  docker_tag_prefix: ghcr.io/tietokilta
  # Skip env validation in CI where secrets are not available
  SKIP_ENV_VALIDATION: "true"
jobs:
  build:
    name: Format, Lint, Check types & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: "Build ui package"
        run: pnpm turbo run build --filter=@tietokilta/ui --force

      - name: Format (to ensure that code has been formatted)
        run: pnpm format && git diff --exit-code

      - name: Generate Payload types
        run: pnpm codegen

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all
        run: pnpm build

  publish-npm:
    name: Publish @tietokilta/ui to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    # Publish on main branch pushes
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'release' && github.event.action == 'published')
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js for npm (OIDC)
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm to latest (required for OIDC)
        run: npm install -g npm@^11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI package
        run: pnpm --filter @tietokilta/ui build

      - name: Publish @tietokilta/ui (alpha and latest)
        run: |
          pnpm publish --filter @tietokilta/ui --no-git-checks --access public --provenance --tag alpha --tag latest

  docker-build-and-push:
    needs: build
    name: Build, smoke-test & publish Docker image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      PUBLISH_IMAGE: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'release' && github.event.action == 'published') }}
      SHA_IMAGE: ghcr.io/tietokilta/web:sha-${{ github.sha }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
      - name: Install smoke-test dependencies
        run: pnpm install --filter web --frozen-lockfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker metadata
        if: env.PUBLISH_IMAGE == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{env.docker_tag_prefix}}/web
          tags: |
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: ${{ env.PUBLISH_IMAGE != 'true' }}
          push: ${{ env.PUBLISH_IMAGE == 'true' }}
          tags: ${{ env.PUBLISH_IMAGE == 'true' && env.SHA_IMAGE || 'web:smoke' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{github.sha}}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test Docker image
        env:
          SMOKE_IMAGE: ${{ env.PUBLISH_IMAGE == 'true' && env.SHA_IMAGE || 'web:smoke' }}
        run: pnpm --filter web test:smoke

      - name: Promote tested Docker image
        if: env.PUBLISH_IMAGE == 'true'
        env:
          TARGET_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              docker buildx imagetools create --tag "$tag" "$SHA_IMAGE"
            fi
          done <<< "$TARGET_TAGS"

  deploy:
    # only run on published releases, enable this when we release
    #if: github.event_name == 'release' && github.event.action == 'published'
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'release' && github.event.action == 'published')
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Login via Azure CLI
        uses: azure/login@v3
        with:
          client-id: ${{secrets.AZURE_CLIENT_ID}}
          subscription-id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
          tenant-id: ${{secrets.AZURE_TENANT_ID}}
      - uses: azure/webapps-deploy@v3
        with:
          app-name: tikweb-web-prod # TODO: if we ever setup more envs than prod, make this variable customizable
          images: "${{ env.docker_tag_prefix }}/web:sha-${{ github.sha }}"
